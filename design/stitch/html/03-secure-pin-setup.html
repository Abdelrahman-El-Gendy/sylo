<style>
        body {
            font-family: 'Geist', sans-serif;
            background-color: #101415;
            color: #e0e3e5;
            margin: 0;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(30, 34, 40, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .pin-dot {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pin-dot.filled {
            background-color: #00f0ff;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.5);
            transform: scale(1.2);
        }
        .keypad-button:active {
            transform: scale(0.9);
            background-color: rgba(255, 255, 255, 0.1);
        }
        .voice-glow {
            box-shadow: 0px 8px 24px rgba(0, 240, 255, 0.3);
        }
        /* Custom toggle switch styling */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #00f0ff;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #00f0ff;
        }
    </style>

                        "on-error": "#690005",

                        "tertiary-fixed": "#dfe2eb",
                        "on-tertiary": "#2d3137",

                        "secondary-fixed": "#e2e2e6",
                        "outline-variant": "#3b494b",
                        "error": "#ffb4ab",
                        "secondary": "#c6c6ca",

                        "error-container": "#93000a",

                        "secondary-fixed-dim": "#c6c6ca",
                        "primary-fixed-dim": "#00dbe9",
                        "outline": "#849495",

                        "surface-tint": "#00dbe9",
                        "surface-bright": "#363a3b",

                    "spacing": {

                    },
                    "fontFamily": {

                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

                },
            },
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">
<!-- Background Shader Overlay -->

<!-- Header Section (Sylo Identity) -->
<header class="fixed top-0 left-0 w-full z-40 flex justify-between items-center px-container-margin h-16 bg-surface/60 backdrop-blur-xl">
<div class="font-headline-md text-headline-md font-bold text-primary-fixed-dim tracking-tight">Sylo</div>
<button class="material-symbols-outlined text-on-surface-variant hover:bg-white/5 transition-colors p-2 rounded-full">close</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center relative z-10 px-container-margin pt-24 pb-12 overflow-y-auto">
<!-- Instructional Content -->
<div class="text-center mb-stack-lg animate-in fade-in slide-in-from-bottom-4 duration-700">
<h1 class="font-headline-lg text-headline-lg text-on-background mb-unit">Create your secure PIN</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-xs mx-auto">This PIN will be used to authorize transactions and secure your financial data.</p>
</div>
<!-- PIN Visualization -->
<div class="flex gap-stack-md mb-section-gap justify-center items-center h-12">
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant" id="dot-0"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant" id="dot-1"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant" id="dot-2"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant" id="dot-3"></div>
</div>
<!-- Custom Numeric Keypad -->
<div class="glass-card p-6 rounded-3xl w-full max-w-[320px] shadow-2xl">
<div class="grid grid-cols-3 gap-stack-sm mb-stack-md">
<button class="keypad-button h-16 rounded-2xl flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-white/5 transition-all" onclick="addNumber('1')">1</button>
<button class="keypad-button h-16 rounded-2xl flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-white/5 transition-all" onclick="addNumber('2')">2</button>
<button class="keypad-button h-16 rounded-2xl flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-white/5 transition-all" onclick="addNumber('3')">3</button>
<button class="keypad-button h-16 rounded-2xl flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-white/5 transition-all" onclick="addNumber('4')">4</button>
<button class="keypad-button h-16 rounded-2xl flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-white/5 transition-all" onclick="addNumber('5')">5</button>
<button class="keypad-button h-16 rounded-2xl flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-white/5 transition-all" onclick="addNumber('6')">6</button>
<button class="keypad-button h-16 rounded-2xl flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-white/5 transition-all" onclick="addNumber('7')">7</button>
<button class="keypad-button h-16 rounded-2xl flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-white/5 transition-all" onclick="addNumber('8')">8</button>
<button class="keypad-button h-16 rounded-2xl flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-white/5 transition-all" onclick="addNumber('9')">9</button>
<div class="h-16 flex items-center justify-center"></div>
<button class="keypad-button h-16 rounded-2xl flex items-center justify-center font-headline-md text-headline-md text-on-surface hover:bg-white/5 transition-all" onclick="addNumber('0')">0</button>
<button class="keypad-button h-16 rounded-2xl flex items-center justify-center text-on-surface-variant hover:bg-white/5 transition-all" onclick="removeNumber()">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
<!-- Biometric Toggle -->
<div class="flex items-center justify-between py-stack-sm border-t border-white/10 mt-unit">
<div class="flex items-center gap-stack-sm">
<span class="material-symbols-outlined text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
<span class="font-label-sm text-label-sm text-on-surface">Enable Biometric Login</span>
</div>
<label class="relative inline-flex items-center cursor-pointer" for="biometric-toggle">
<input class="sr-only peer" id="biometric-toggle" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
</div>
</main>
<!-- Footer Security Message -->
<footer class="fixed bottom-0 left-0 w-full p-container-margin text-center z-20">
<div class="flex items-center justify-center gap-unit text-on-secondary-container opacity-40">
<span class="material-symbols-outlined text-[14px]">lock</span>
<span class="font-label-sm text-label-sm">End-to-end encrypted storage</span>
</div>
</footer>
<!-- Interactive Logic -->
<script>
        let currentPin = "";
        const maxPinLength = 4;

        function addNumber(num) {
            if (currentPin.length < maxPinLength) {
                currentPin += num;
                updateDots();
                if (currentPin.length === maxPinLength) {
                    validatePin();
                }
            }
        }

        function removeNumber() {
            if (currentPin.length > 0) {
                currentPin = currentPin.slice(0, -1);
                updateDots();
            }
        }

        function updateDots() {
            for (let i = 0; i < maxPinLength; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (i < currentPin.length) {
                    dot.classList.add('filled');
                    dot.classList.remove('border-outline-variant');
                } else {
                    dot.classList.remove('filled');
                    dot.classList.add('border-outline-variant');
                }
            }
        }

        function validatePin() {
            // Simulate processing
            setTimeout(() => {
                const mainContainer = document.querySelector('main');
                // Brief visual feedback for success
                document.querySelectorAll('.pin-dot').forEach(dot => {
                    dot.style.backgroundColor = '#4ade80'; // Temporary success green
                    dot.style.boxShadow = '0 0 20px rgba(74, 222, 128, 0.6)';
                });

                console.log("PIN Created:", currentPin);
                
                // Final state feedback (simulated navigation/completion)
                setTimeout(() => {
                    alert("PIN Setup Successfully");
                    currentPin = "";
                    updateDots();
                }, 500);
            }, 300);
        }

        // Haptic feel vibration for mobile
        function triggerHaptic() {
            if ('vibrate' in navigator) {
                navigator.vibrate(10);
            }
        }

        document.querySelectorAll('.keypad-button').forEach(btn => {
            btn.addEventListener('click', triggerHaptic);
        });
    </script>
</body></html>
