<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sylo - Add Expense</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&amp;family=Geist:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Geist', sans-serif;
            background-color: #101415;
            color: #e0e3e5;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(30, 34, 40, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .sylo-blue-glow {
            box-shadow: 0px 8px 24px rgba(0, 240, 255, 0.3);
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00f0ff !important;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#1d2022",
                        "on-background": "#e0e3e5",
                        "on-secondary-fixed-variant": "#45474a",
                        "on-secondary-container": "#bbbbbf",
                        "on-secondary-fixed": "#1a1c1f",
                        "primary": "#dbfcff",
                        "on-surface": "#e0e3e5",
                        "surface-dim": "#101415",
                        "on-secondary": "#2f3034",
                        "on-primary-fixed-variant": "#004f54",
                        "surface-container-high": "#272a2c",
                        "on-primary": "#00363a",
                        "background": "#101415",
                        "primary-fixed": "#7df4ff",
                        "on-tertiary-container": "#5b5f66",
                        "surface-container-low": "#191c1e",
                        "on-error": "#690005",
                        "secondary-container": "#4a4b4f",
                        "tertiary-fixed": "#dfe2eb",
                        "on-tertiary": "#2d3137",
                        "primary-container": "#00f0ff",
                        "secondary-fixed": "#e2e2e6",
                        "outline-variant": "#3b494b",
                        "error": "#ffb4ab",
                        "secondary": "#c6c6ca",
                        "surface-container-highest": "#323537",
                        "tertiary-container": "#d6d9e1",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#c3c6ce",
                        "on-primary-fixed": "#002022",
                        "on-tertiary-fixed-variant": "#43474e",
                        "inverse-on-surface": "#2d3133",
                        "inverse-primary": "#006970",
                        "on-surface-variant": "#b9cacb",
                        "surface-variant": "#323537",
                        "inverse-surface": "#e0e3e5",
                        "error-container": "#93000a",
                        "on-primary-container": "#006970",
                        "secondary-fixed-dim": "#c6c6ca",
                        "primary-fixed-dim": "#00dbe9",
                        "outline": "#849495",
                        "surface-container-lowest": "#0b0f10",
                        "on-tertiary-fixed": "#181c22",
                        "surface-tint": "#00dbe9",
                        "surface-bright": "#363a3b",
                        "surface": "#101415",
                        "tertiary": "#f3f5fe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "gutter": "16px",
                        "stack-lg": "32px",
                        "section-gap": "48px",
                        "unit": "4px",
                        "container-margin": "24px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Geist"],
                        "label-mono": ["JetBrains Mono"],
                        "display-lg": ["Geist"],
                        "headline-md": ["Geist"],
                        "headline-lg-mobile": ["Geist"],
                        "body-lg": ["Geist"],
                        "label-sm": ["Geist"],
                        "headline-lg": ["Geist"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-mono": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background overflow-x-hidden">
<!-- Top AppBar (Navigation Shell suppressed for task-focused page) -->
<header class="fixed top-0 left-0 w-full z-40 flex justify-between items-center px-container-margin h-16 bg-surface/60 backdrop-blur-xl">
<button class="w-10 h-10 flex items-center justify-center hover:bg-white/5 transition-colors rounded-full active:scale-95">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary-fixed-dim tracking-tight">New Expense</h1>
<div class="w-10 h-10 flex items-center justify-center">
<!-- Empty for balance -->
</div>
</header>
<main class="pt-24 pb-32 px-container-margin max-w-2xl mx-auto">
<!-- Amount Input Section -->
<section class="mb-stack-lg text-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mb-unit block">Amount</label>
<div class="relative flex items-center justify-center">
<span class="font-display-lg text-display-lg text-primary-fixed-dim absolute left-[15%] opacity-50">$</span>
<input class="bg-transparent border-none text-center font-display-lg text-display-lg text-on-surface w-full focus:ring-0 placeholder:text-surface-container-highest" id="amount-input" placeholder="0.00" step="0.01" type="number"/>
</div>
<div class="w-24 h-1 bg-primary-container mx-auto mt-2 rounded-full opacity-30"></div>
</section>
<!-- Form Elements -->
<div class="space-y-stack-md">
<!-- Category Grid Selection -->
<section>
<label class="font-label-sm text-label-sm text-on-surface-variant mb-stack-sm block ml-1">Category</label>
<div class="grid grid-cols-4 gap-stack-sm" id="category-grid">
<button class="category-chip flex flex-col items-center justify-center p-unit glass-card rounded-xl border-primary-container/40 bg-primary-container/10 ring-1 ring-primary-container/20" data-category="Food">
<span class="material-symbols-outlined text-primary-fixed-dim mb-1">restaurant</span>
<span class="font-label-sm text-label-sm">Food</span>
</button>
<button class="category-chip flex flex-col items-center justify-center p-unit glass-card rounded-xl hover:bg-white/5 transition-colors" data-category="Transport">
<span class="material-symbols-outlined text-on-surface-variant mb-1">directions_car</span>
<span class="font-label-sm text-label-sm">Travel</span>
</button>
<button class="category-chip flex flex-col items-center justify-center p-unit glass-card rounded-xl hover:bg-white/5 transition-colors" data-category="Shopping">
<span class="material-symbols-outlined text-on-surface-variant mb-1">shopping_bag</span>
<span class="font-label-sm text-label-sm">Shopping</span>
</button>
<button class="category-chip flex flex-col items-center justify-center p-unit glass-card rounded-xl hover:bg-white/5 transition-colors" data-category="Entertainment">
<span class="material-symbols-outlined text-on-surface-variant mb-1">movie</span>
<span class="font-label-sm text-label-sm">Leisure</span>
</button>
</div>
</section>
<!-- Date & Notes -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<section class="glass-card p-stack-md rounded-xl">
<label class="font-label-sm text-label-sm text-on-surface-variant mb-unit block">Date</label>
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-primary-fixed-dim text-body-md">calendar_today</span>
<input class="bg-transparent border-none p-0 font-body-md text-body-md text-on-surface focus:ring-0 w-full" type="date" value="2023-10-27"/>
</div>
</section>
<section class="glass-card p-stack-md rounded-xl">
<label class="font-label-sm text-label-sm text-on-surface-variant mb-unit block">Payment Method</label>
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-primary-fixed-dim text-body-md">credit_card</span>
<select class="bg-transparent border-none p-0 font-body-md text-body-md text-on-surface focus:ring-0 w-full appearance-none">
<option class="bg-surface-container">Personal Debit</option>
<option class="bg-surface-container">Sylo Credit Card</option>
<option class="bg-surface-container">Cash</option>
</select>
</div>
</section>
</div>
<!-- Notes Section -->
<section class="glass-card p-stack-md rounded-xl">
<label class="font-label-sm text-label-sm text-on-surface-variant mb-unit block">Note</label>
<textarea class="bg-transparent border-none p-0 font-body-md text-body-md text-on-surface focus:ring-0 w-full resize-none placeholder:text-on-secondary-container/50" placeholder="What was this for?" rows="3"></textarea>
</section>
<!-- Receipt Upload Placeholder -->
<section class="border-2 border-dashed border-outline-variant/30 rounded-xl p-stack-lg flex flex-col items-center justify-center hover:border-primary-container/50 transition-colors group cursor-pointer">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary-fixed-dim transition-colors text-3xl mb-2">add_a_photo</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Attach Receipt (Optional)</span>
</section>
</div>
</main>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 left-0 w-full p-container-margin bg-gradient-to-t from-background via-background/95 to-transparent z-40">
<div class="max-w-2xl mx-auto">
<button class="w-full h-14 bg-primary-container text-on-primary-container font-headline-md text-headline-md font-bold rounded-full sylo-blue-glow active:scale-95 transition-all flex items-center justify-center space-x-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span>Save Expense</span>
</button>
</div>
</div>
<!-- Voice Interaction Hint (Floating Aura) -->
<div class="fixed bottom-24 right-6 w-12 h-12 bg-primary-container/20 backdrop-blur-md border border-primary-container/30 rounded-full flex items-center justify-center cursor-pointer hover:scale-110 transition-transform sylo-blue-glow group">
<span class="material-symbols-outlined text-primary-fixed-dim group-hover:animate-pulse">mic</span>
<div class="absolute -top-12 right-0 bg-surface-container-high px-3 py-1 rounded-lg border border-white/5 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">
<span class="font-label-sm text-label-sm text-primary-fixed-dim">"Add $45 for lunch"</span>
</div>
</div>
<script>
        // Micro-interaction for Category Chips
        const chips = document.querySelectorAll('.category-chip');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                // Reset all
                chips.forEach(c => {
                    c.classList.remove('border-primary-container/40', 'bg-primary-container/10', 'ring-1', 'ring-primary-container/20');
                    c.querySelector('span.material-symbols-outlined').classList.remove('text-primary-fixed-dim');
                    c.querySelector('span.material-symbols-outlined').classList.add('text-on-surface-variant');
                });
                
                // Set active
                chip.classList.add('border-primary-container/40', 'bg-primary-container/10', 'ring-1', 'ring-primary-container/20');
                chip.querySelector('span.material-symbols-outlined').classList.remove('text-on-surface-variant');
                chip.querySelector('span.material-symbols-outlined').classList.add('text-primary-fixed-dim');
            });
        });

        // Simple amount input focus effect
        const amountInput = document.getElementById('amount-input');
        amountInput.addEventListener('focus', () => {
            amountInput.parentElement.nextElementSibling.classList.replace('opacity-30', 'opacity-100');
        });
        amountInput.addEventListener('blur', () => {
            amountInput.parentElement.nextElementSibling.classList.replace('opacity-100', 'opacity-30');
        });
    </script>
</body></html>
