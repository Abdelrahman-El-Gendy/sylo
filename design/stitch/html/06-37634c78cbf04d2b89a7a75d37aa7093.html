<style>
        body {
            background-color: #101415;
            color: #e0e3e5;
            font-family: 'Geist', sans-serif;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(30, 34, 40, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .pulse-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #00f0ff;
            opacity: 0;
            animation: pulse 3s cubic-bezier(0.24, 0, 0.38, 1) infinite;
        }

        .pulse-ring:nth-child(2) {
            animation-delay: 1s;
        }

        .pulse-ring:nth-child(3) {
            animation-delay: 2s;
        }

        @keyframes pulse {
            0% { transform: scale(0.6); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .sylo-blue-glow {
            box-shadow: 0px 8px 24px rgba(0, 240, 255, 0.3);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- Background Atmospheric Effect -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-primary-container/5 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] rounded-full bg-surface-tint/5 blur-[100px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-between px-container-margin pt-20 pb-12">
<!-- Illustration Section -->
<div class="flex-1 flex items-center justify-center w-full max-w-md">
<div class="pulse-container w-64 h-64">
<div class="pulse-ring"></div>
<div class="pulse-ring"></div>
<div class="pulse-ring"></div>
<div class="relative z-20 w-40 h-40 glass-card rounded-full flex items-center justify-center border-primary-container/20 border-2">
<span class="material-symbols-outlined text-[80px] text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">
                        verified_user
                    </span>
</div>
</div>
</div>
<!-- Typography Section -->
<div class="w-full max-w-lg text-center space-y-stack-md mb-12">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface tracking-tight">
                Your data, secured
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto opacity-80 leading-relaxed">
                Bank-level encryption and biometric security keep your financial life private and protected.
            </p>
</div>
<!-- Controls Section -->
<div class="w-full max-w-md flex flex-col items-center gap-10">
<!-- Pagination Dots -->
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-on-secondary-container/20"></div>
<div class="w-2 h-2 rounded-full bg-on-secondary-container/20"></div>
<div class="w-6 h-2 rounded-full bg-primary-container transition-all duration-500"></div>
</div>
<!-- CTA Button -->
<button class="group relative w-full h-16 rounded-xl overflow-hidden sylo-blue-glow active:scale-[0.98] transition-all duration-200">
<div class="absolute inset-0 bg-gradient-to-r from-primary-fixed-dim to-surface-tint"></div>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="relative z-10 font-headline-md text-headline-md text-on-primary-fixed flex items-center justify-center gap-2">
                    Get Started
                    <span class="material-symbols-outlined text-on-primary-fixed group-hover:translate-x-1 transition-transform">
                        arrow_forward
                    </span>
</span>
</button>
</div>
</main>
<!-- Footer Security Badge -->
<footer class="relative z-10 py-6 flex justify-center items-center gap-2 opacity-40">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">AES-256 Encrypted Connection</span>
</footer>
<script>
        // Micro-interaction for the button
        const btn = document.querySelector('button');
        btn.addEventListener('mouseenter', () => {
            // Logic for subtle hover state handled by Tailwind/CSS
        });

        // Entrance animation
        window.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('h1, p, .pulse-container, .flex.items-center.gap-3, button');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100 + (index * 150));
            });
        });
    </script>
</body></html>
