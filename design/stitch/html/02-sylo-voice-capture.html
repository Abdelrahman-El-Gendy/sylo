<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sylo Voice Capture</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;family=Geist:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.2; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .pulse-layer {
            animation: pulse-ring 3s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }

        .pulse-layer-delayed {
            animation: pulse-ring 3s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
            animation-delay: 1s;
        }

        .glass-panel {
            background: rgba(29, 32, 34, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .mic-gradient {
            background: radial-gradient(circle at center, #00f0ff 0%, #00dbe9 100%);
            box-shadow: 0px 8px 32px rgba(0, 240, 255, 0.4);
        }

        .voice-wave-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 40px;
        }

        .wave-bar {
            width: 4px;
            background: #00dbe9;
            border-radius: 2px;
            animation: wave-animation 1.2s ease-in-out infinite;
        }

        @keyframes wave-animation {
            0%, 100% { height: 8px; }
            50% { height: 32px; }
        }
    </style>

                        "on-secondary": "#2f3034",
                        "on-primary-fixed-variant": "#004f54",
                        "surface-container-high": "#272a2c",
                        "on-primary": "#00363a",

                        "primary-fixed": "#7df4ff",
                        "on-tertiary-container": "#5b5f66",
                        "surface-container-low": "#191c1e",
                        "on-error": "#690005",
                        "secondary-container": "#4a4b4f",
                        "tertiary-fixed": "#dfe2eb",
                        "on-tertiary": "#2d3137",
                        "primary-container": "#00f0ff",
                        "secondary-fixed": "#e2e2e6",
                        "outline-variant": "#3b494b",
                        "error": "#ffb4ab",
                        "secondary": "#c6c6ca",
                        "surface-container-highest": "#323537",
                        "tertiary-container": "#d6d9e1",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#c3c6ce",
                        "on-primary-fixed": "#002022",
                        "on-tertiary-fixed-variant": "#43474e",
                        "inverse-on-surface": "#2d3133",
                        "inverse-primary": "#006970",
                        "on-surface-variant": "#b9cacb",
                        "surface-variant": "#323537",
                        "inverse-surface": "#e0e3e5",
                        "error-container": "#93000a",
                        "on-primary-container": "#006970",
                        "secondary-fixed-dim": "#c6c6ca",
                        "primary-fixed-dim": "#00dbe9",
                        "outline": "#849495",
                        "surface-container-lowest": "#0b0f10",
                        "on-tertiary-fixed": "#181c22",
                        "surface-tint": "#00dbe9",
                        "surface-bright": "#363a3b",
                        "surface": "#101415",
                        "tertiary": "#f3f5fe"

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {
                        "stack-sm": "8px",
                        "gutter": "16px",
                        "stack-lg": "32px",
                        "section-gap": "48px",
                        "unit": "4px",
                        "container-margin": "24px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Geist"],
                        "label-mono": ["JetBrains Mono"],

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Background Shader Atmosphere -->
<div class="fixed inset-0 z-0 pointer-events-none">

</div>
<!-- Top AppBar (JSON Derived) -->
<header class="fixed top-0 left-0 w-full z-40 flex justify-between items-center px-container-margin h-16 bg-surface/60 backdrop-blur-xl">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-variant ring-1 ring-white/10">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a person with warm lighting against a blurred office background, looking directly into the camera. The style is modern and high-end, using a sophisticated charcoal and cyan color palette to match the financial app's aesthetic. Soft shadows and high-quality lens blur enhance the portrait's depth." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBFOSLnuzHlvK514TZ5B0i1qnIg8GRV-GDZXbWHJeH8VnK1nZAFp611uyRCVUejGTArGsa0RuuMUnS4yETMO8GLFzfy-o9QQGb2uDWWyEjKVhlJ0QwQYABTFlcapZykfghxo511FNLzQpomVvFJnAtyvwAyww3tksJ2dMXhHJrrs4o7GsBptUal_AlNudxbnyYrA2oVgSkWpzubs5bS2LNiCJGJZVlwyEcZRu63vH2Ia2W7snD0REY-"/>
</div>
<span class="font-headline-md text-headline-md font-bold text-primary-fixed-dim tracking-tight">Sylo</span>
</div>
<button class="p-2 rounded-full hover:bg-white/5 transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary-fixed-dim">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="relative flex-grow flex flex-col items-center justify-center z-10 px-container-margin pt-16 pb-24">
<!-- Live Status Chip -->
<div class="mb-12 flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 backdrop-blur-md">
<span class="w-2 h-2 rounded-full bg-primary-container animate-pulse"></span>
<span class="font-label-mono text-label-sm text-primary-fixed uppercase tracking-widest">Listening...</span>
</div>
<!-- Central Mic Interaction -->
<div class="relative flex items-center justify-center mb-16">
<!-- Pulsating Background Rings -->
<div class="absolute w-64 h-64 rounded-full border-2 border-primary/20 pulse-layer"></div>
<div class="absolute w-64 h-64 rounded-full border-2 border-primary/10 pulse-layer-delayed"></div>
<!-- Voice FAB -->
<button class="relative z-20 w-24 h-24 rounded-full mic-gradient flex items-center justify-center active:scale-90 transition-transform duration-150 group">
<span class="material-symbols-outlined text-on-primary text-4xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- Transcription Area -->
<div class="w-full max-w-lg text-center space-y-4">
<div class="space-y-2">
<p class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface opacity-90 transition-opacity duration-300" id="transcription-text">
                    "Add 45 dirhams for <span class="text-primary-container border-b-2 border-primary-container/30">lunch</span>..."
                </p>
<p class="font-body-md text-body-md text-on-surface-variant opacity-60">
                    Watching for category: Food &amp; Drinks
                </p>
</div>
<!-- Visualizer Bars -->
<div class="voice-wave-container">
<div class="wave-bar" style="animation-delay: 0.1s"></div>
<div class="wave-bar" style="animation-delay: 0.3s"></div>
<div class="wave-bar" style="animation-delay: 0.2s"></div>
<div class="wave-bar" style="animation-delay: 0.4s"></div>
<div class="wave-bar" style="animation-delay: 0.1s"></div>
<div class="wave-bar" style="animation-delay: 0.5s"></div>
<div class="wave-bar" style="animation-delay: 0.3s"></div>
<div class="wave-bar" style="animation-delay: 0.2s"></div>
</div>
</div>
<!-- Insight Suggestion Card (Glassmorphic) -->
<div class="mt-16 w-full max-w-sm glass-panel p-5 rounded-xl transition-all duration-500 transform translate-y-0 opacity-100 flex items-start gap-4">
<div class="p-2.5 rounded-lg bg-primary-container/10">
<span class="material-symbols-outlined text-primary-container">restaurant</span>
</div>
<div class="flex-grow">
<h4 class="font-label-mono text-label-sm text-primary-fixed opacity-60 uppercase mb-1">Previous Context</h4>
<p class="font-body-md text-body-md text-on-surface">You usually spend ~35 AED on lunch at this time.</p>
</div>
</div>
</main>
<!-- Bottom Action Controls -->
<div class="fixed bottom-32 left-0 w-full flex justify-center gap-stack-lg z-30 px-container-margin">
<button class="flex flex-col items-center gap-2 opacity-60 hover:opacity-100 transition-opacity group">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center group-hover:bg-surface-variant">
<span class="material-symbols-outlined text-on-surface">close</span>
</div>
<span class="font-label-sm text-label-sm">Cancel</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-full bg-primary-fixed-dim flex items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-primary-fixed">check</span>
</div>
<span class="font-label-sm text-label-sm text-primary-fixed-dim font-bold">Confirm</span>
</button>
</div>
<!-- BottomNavBar (JSON Derived) - Suppressed for Focused Task (Voice Capture) -->
<!-- As per instructions: "suppress the navigation shell if the page intent is Task-Focused" -->
<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const transcription = document.getElementById('transcription-text');
            const bars = document.querySelectorAll('.wave-bar');
            
            // Randomize bar heights to simulate voice activity
            setInterval(() => {
                bars.forEach(bar => {
                    const height = Math.floor(Math.random() * 30) + 10;
                    bar.style.height = `${height}px`;
                });
            }, 150);

            // Subtle transcription text "typing" effect simulation
            const textOptions = [
                '"Add 45 dirhams for lunch..."',
                '"Add 45 dirhams for lunch with Sarah..."',
                '"Add 45 dirhams for lunch with Sarah at Mall..."',
                '"Add 45 dirhams for lunch at Mall of Emirates..."',
            ];
            let index = 0;
            
            setInterval(() => {
                if(index < textOptions.length) {
                    transcription.innerHTML = textOptions[index];
                    index++;
                }
            }, 2500);
        });
    </script>
</body></html>
