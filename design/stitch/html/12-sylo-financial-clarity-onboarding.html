                    "secondary-fixed": "#e2e2e6",
                    "error-container": "#93000a",
                    "primary": "#dbfcff",
                    "tertiary": "#f3f5fe",
                    "surface-bright": "#363a3b",
                    "secondary": "#c6c6ca",
                    "outline": "#849495",

<style>
        body {
            background-color: #101415;
            color: #e0e3e5;
            font-family: 'Geist', sans-serif;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(30, 34, 40, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sylo-glow {
            box-shadow: 0px 0px 40px rgba(0, 240, 255, 0.15);
        }

        .pulse-slow {
            animation: pulse-ring 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-ring {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen items-center justify-between overflow-hidden px-container-margin py-12">
<!-- Atmospheric Background Element -->
<div class="fixed top-[-10%] right-[-10%] w-[80vw] h-[80vw] bg-primary-container/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[60vw] h-[60vw] bg-surface-tint/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Header / Brand -->
<header class="w-full flex justify-center mb-section-gap z-10">
<div class="flex items-center gap-2">
<span class="font-headline-md text-headline-md font-bold text-primary-fixed-dim tracking-tight">Sylo</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center w-full max-w-md gap-12 z-10">
<!-- Illustration Container -->
<div class="relative w-full aspect-square flex items-center justify-center">
<!-- Growth Chart & Budget Ring Visual -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-64 h-64 rounded-full border-4 border-white/5 flex items-center justify-center relative">
<!-- Progress Ring -->
<svg class="w-full h-full transform -rotate-90">
<circle class="text-white/5" cx="128" cy="128" fill="transparent" r="110" stroke="currentColor" stroke-width="12"></circle>
<circle class="text-primary-fixed-dim sylo-glow" cx="128" cy="128" fill="transparent" r="110" stroke="currentColor" stroke-dasharray="690" stroke-dashoffset="200" stroke-width="12" style="transition: stroke-dashoffset 1s ease-out;"></circle>
</svg>
<!-- Growth Line Mockup -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-3/4 h-1/2 flex items-end justify-between px-4">
<div class="w-2 bg-primary-fixed-dim/20 rounded-t-full h-[30%]"></div>
<div class="w-2 bg-primary-fixed-dim/40 rounded-t-full h-[50%]"></div>
<div class="w-2 bg-primary-fixed-dim/60 rounded-t-full h-[45%]"></div>
<div class="w-2 bg-primary-fixed-dim/80 rounded-t-full h-[75%]"></div>
<div class="w-2 bg-primary-fixed-dim rounded-t-full h-[100%] sylo-glow"></div>
</div>
</div>
<!-- Inner Label -->
<div class="absolute flex flex-col items-center text-center">
<span class="font-label-mono text-label-mono text-on-surface-variant uppercase tracking-widest">Insights</span>
<span class="font-headline-lg text-headline-lg text-primary-fixed-dim font-bold">84%</span>
</div>
</div>
<!-- Floating Glass Mini-Cards -->
<div class="absolute top-4 right-0 glass-card p-3 rounded-xl animate-bounce" style="animation-duration: 3s;">
<div class="flex items-center gap-2">
<div class="w-6 h-6 bg-primary-fixed-dim/10 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-primary-fixed-dim">trending_up</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface">+12.4%</span>
</div>
</div>
<div class="absolute bottom-10 left-[-10px] glass-card p-3 rounded-xl animate-pulse" style="animation-duration: 4s;">
<div class="flex items-center gap-2">
<div class="w-6 h-6 bg-tertiary-container/10 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-on-tertiary-container">shopping_bag</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface">Saving</span>
</div>
</div>
</div>
<!-- Shadow/Depth -->
<div class="w-48 h-12 bg-black/40 blur-2xl rounded-full absolute bottom-4"></div>
</div>
<!-- Text Content -->
<div class="text-center space-y-4">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface font-bold">
                See the full picture
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
                Automated insights and clear visualizations help you understand your spending habits at a glance.
            </p>
</div>
</main>
<!-- Footer Controls -->
<footer class="w-full flex flex-col items-center gap-stack-lg z-10">
<!-- Pagination Dots -->
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-white/20"></div>
<div class="w-6 h-2 rounded-full bg-primary-fixed-dim"></div>
<div class="w-2 h-2 rounded-full bg-white/20"></div>
</div>
<!-- CTA Action -->
<button class="w-full max-w-xs group relative overflow-hidden bg-white/5 hover:bg-white/10 text-on-surface border border-white/10 rounded-full py-4 px-8 transition-all active:scale-95 duration-200" onclick="handleNext()">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700 ease-in-out"></div>
<div class="flex items-center justify-center gap-2 font-headline-md text-headline-md font-semibold">
                Next
                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">chevron_right</span>
</div>
</button>
</footer>
<script>
        function handleNext() {
            // Minimalist transition effect before navigation
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            setTimeout(() => {
                // In a real app, this would navigate to screen 3
                console.log("Navigating to Screen 3: Smarter Automation");
                document.body.style.opacity = '1';
            }, 500);
        }

        // Random micro-interaction for visual interest
        document.addEventListener('mousemove', (e) => {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const moveX = (e.clientX - centerX) / 50;
            const moveY = (e.clientY - centerY) / 50;
            
            const visual = document.querySelector('.relative.w-full.aspect-square');
            if(visual) {
                visual.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
</body></html>
