<body class="bg-background text-on-background flex flex-col min-h-screen items-center justify-between py-12 px-container-margin overflow-hidden relative">

<!-- Header Section -->

<!-- Main Content: PIN & Keypad -->
<main class="w-full max-w-sm flex flex-col items-center z-10 flex-grow justify-center mt-12">

<div class="pin-dot w-3.5 h-3.5 rounded-full border border-outline/40"></div>
<div class="pin-dot w-3.5 h-3.5 rounded-full border border-outline/40"></div>
<div class="pin-dot w-3.5 h-3.5 rounded-full border border-outline/40"></div>

<!-- Glassmorphic Keypad Container -->

</button>
<!-- Row 2 -->

</button>
<button class="keypad-btn flex items-center justify-center aspect-square rounded-full transition-all duration-150" onclick="pressKey('5')">

</button>
<!-- Row 3 -->

<span class="font-headline-md text-headline-md text-on-surface">7</span>
</button>
<button class="keypad-btn flex items-center justify-center aspect-square rounded-full transition-all duration-150" onclick="pressKey('8')">

<button class="keypad-btn flex items-center justify-center aspect-square rounded-full transition-all duration-150" onclick="pressKey('9')">

</button>

</button>

<!-- Footer Section: Biometric Action -->
<footer class="w-full max-w-sm flex flex-col items-center gap-6 z-10">

<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center pulse-active transition-transform active:scale-95">
<span class="material-symbols-outlined text-on-primary-container text-[32px]" data-icon="faceid" style="font-variation-settings: 'wght' 200;">face</span>
</div>
<span class="font-label-sm text-label-sm text-primary-fixed-dim tracking-widest uppercase mt-2">Unlock with FaceID</span>
</button>
<div class="flex gap-8 mt-4">
<button class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors">Forgot PIN?</button>
<button class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors">Emergency</button>
</div>
</footer>
<!-- Script for interaction -->
<script>
        let currentPin = "";
        const maxPinLength = 4;
        const pinDots = document.querySelectorAll('.pin-dot');

        function pressKey(num) {
            if (currentPin.length < maxPinLength) {
                currentPin += num;
                updateDots();
                
                // Feedback for UX
                if (currentPin.length === maxPinLength) {
                    validatePin();
                }
            }
        }

        function deleteKey() {
            if (currentPin.length > 0) {
                currentPin = currentPin.slice(0, -1);
                updateDots();
            }
        }

        function updateDots() {
            pinDots.forEach((dot, index) => {
                if (index < currentPin.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        function validatePin() {
            // Simulated validation
            setTimeout(() => {
                if (currentPin === "1234") { // Mock success code
                    document.body.style.opacity = "0";
                    document.body.style.transform = "scale(1.1)";
                    document.body.style.transition = "all 0.5s ease-in-out";
                    setTimeout(() => alert('Authorized. Redirecting to Dashboard...'), 300);
                } else {
                    // Shake animation for error
                    const pinContainer = document.getElementById('pin-container');
                    pinContainer.classList.add('animate-shake');
                    pinDots.forEach(dot => dot.classList.add('bg-error'));
                    
                    setTimeout(() => {
                        currentPin = "";
                        updateDots();
                        pinContainer.classList.remove('animate-shake');
                        pinDots.forEach(dot => dot.classList.remove('bg-error'));
                    }, 600);
                }
            }, 300);
        }

        // Handle FaceID Button
        document.getElementById('faceid-btn').addEventListener('click', function() {
            this.querySelector('.material-symbols-outlined').innerText = 'refresh';
            this.querySelector('.material-symbols-outlined').classList.add('animate-spin');
            
            setTimeout(() => {
                alert('Biometric Identification Successful');
                document.body.style.opacity = "0";
            }, 1200);
        });

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-8px); }
                75% { transform: translateX(8px); }
            }
            .animate-shake {
                animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both 3;
            }
            .animate-fade-in {
                animation: fadeIn 0.8s ease-out forwards;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(-10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body></html>
